<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swapcat - ИИ Агент</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="style.css?v=20260409-3">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script>
(function(){
  var t = localStorage.getItem('swapcat_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">

  <header>
    <div class="logo">SС</div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="theme-toggle" id="themeToggle" title="Сменить тему" onclick="toggleTheme()">
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <div class="status-badge" id="statusBadge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Проверка...</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-tag"><span>v.1</span> — персональный AI-ассистент</div>
    <h1>ИИ агент,<br>который <em>думает</em><br><span class="dim">с вами</span></h1>
    <p class="hero-desc">Swapcat помогает писать, анализировать и ускорять работу. Один интерфейс для задач, файлов и быстрых сессий.</p>
    <button class="btn-primary" onclick="startChat()">Начать сессию</button>
  </section>

  <section class="chat-section" id="chatSection">
    <div class="section-label">Интерфейс Swapcat</div>
    <div class="chat-shell">

      <div class="sessions-panel" id="sessionsPanel">
        <div class="sessions-panel-header">
          <span class="sessions-panel-title">Сессии</span>
          <div class="sessions-panel-actions">
            <button class="sessions-panel-new" onclick="newSession()" title="Новая сессия">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="sessions-panel-clear" onclick="clearAllSessions()" title="Очистить все сессии">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>
            <button class="sessions-panel-close" onclick="closeSessionsPanel()" title="Закрыть">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="session-list" id="sessionsList"></div>
      </div>

      <div class="chat-window" id="chatWindow">
        <div class="chat-header">
          <button class="sessions-toggle-btn" onclick="toggleSessionsPanel()" title="Сессии">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="chat-header-dots">
            <div class="chat-header-dot" style="background:#c4855a"></div>
            <div class="chat-header-dot"></div>
            <div class="chat-header-dot"></div>
          </div>
          <div class="chat-header-info">
            <span class="chat-header-session" id="chatHeaderSession">Swapcat — ИИ агент</span>
          </div>
          <button class="new-session-btn" onclick="newSession()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Новая сессия
          </button>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="edit-indicator" id="editIndicator" style="display:none">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span id="editIndicatorText">Редактирование</span>
          <button onclick="cancelEdit()">✕ отмена</button>
        </div>

        <div class="chat-input-area" id="chatInputArea">
          <div class="chat-input-row">
            <button class="attach-btn" id="attachBtn" title="Прикрепить файл или изображение">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea class="chat-input" id="chatInput" placeholder="Введите задачу, перетащите файл или изображение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
            <button class="stop-btn" id="stopBtn" onclick="stopGeneration()" title="Остановить">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
          </div>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*,.txt,.md,.py,.js,.ts,.jsx,.tsx,.html,.css,.json,.csv,.xml,.yaml,.yml,.sh,.c,.cpp,.h,.java,.go,.rs,.rb,.php,.sql,.log,.toml,.ini" style="display:none">
      </div>

    </div>
  </section>

  <footer>
    <div class="logo">Swapcat</div>
    <div>Swapcat AI</div>
  </footer>

</div>

<script src="script.js?v=20260409-3"></script>
</body>
</html>
